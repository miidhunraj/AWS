<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#080400;
  width:100%; height:520px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Georgia',serif;
  overflow:hidden; position:relative;
}
canvas { position:absolute; inset:0; width:100%!important; height:100%!important; }

.ui {
  position:relative; z-index:10;
  text-align:center;
  display:flex; flex-direction:column; align-items:center;
  gap:10px;
  margin-top:140px;
}

.eyebrow {
  font-family:'Segoe UI',sans-serif;
  font-size:10px; letter-spacing:6px; text-transform:uppercase;
  color:#f59e0b; opacity:0.7;
}

h1 {
  font-size:38px; font-weight:400;
  color:#fff;
  line-height:1.15;
  font-style:italic;
  letter-spacing:-1px;
  text-shadow: 0 0 60px rgba(245,158,11,0.5);
}
h1 em {
  font-style:normal;
  background: linear-gradient(90deg,#ff9a00,#fde68a,#f59e0b);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}

.divider {
  width:40px; height:1px;
  background:linear-gradient(90deg,transparent,#f59e0b,transparent);
}

.tagline {
  font-family:'Segoe UI',sans-serif;
  font-size:13px; color:rgba(255,255,255,0.38);
  letter-spacing:1px; line-height:1.7;
  max-width:280px;
}

.bar-row {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  width:200px;
}
.bar-track {
  width:100%; height:1.5px;
  background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden;
}
.bar-fill {
  height:100%; width:0; border-radius:2px;
  background:linear-gradient(90deg,#e65c00,#fde68a);
  animation:prog 3s cubic-bezier(.4,0,.2,1) forwards 0.8s;
}
@keyframes prog { to { width:74%; } }
.bar-label {
  font-family:'Segoe UI',sans-serif;
  font-size:10px; letter-spacing:3px;
  color:rgba(245,158,11,0.55); text-transform:uppercase;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
.ui > * { animation: fadeUp 0.7s ease both; }
.ui > *:nth-child(1){ animation-delay:0.1s }
.ui > *:nth-child(2){ animation-delay:0.25s }
.ui > *:nth-child(3){ animation-delay:0.4s }
.ui > *:nth-child(4){ animation-delay:0.55s }
.ui > *:nth-child(5){ animation-delay:0.7s }
.ui > *:nth-child(6){ animation-delay:0.85s }
</style>

<canvas id="c"></canvas>

<div class="ui">
  <div class="eyebrow">Scheduled Maintenance</div>
  <h1><em>We'll be</em><br>back soon</h1>
  <div class="divider"></div>
  <p class="tagline">Our engineers are polishing things up.<br>Sit back — we won't be long.</p>
  <div class="bar-row">
    <div class="bar-track"><div class="bar-fill"></div></div>
    <div class="bar-label">74% complete</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const W = () => document.body.clientWidth || 600, H = 520;
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true, alpha: true });
renderer.setSize(W(), H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x080400, 0.09);

const camera = new THREE.PerspectiveCamera(48, W() / H, 0.1, 60);
camera.position.set(0, 1.8, 8.5);
camera.lookAt(0, 0.2, 0);

const mat = (c, r=0.2, m=0.9) => new THREE.MeshStandardMaterial({ color:c, roughness:r, metalness:m });

function gear(teeth, radius, depth, color) {
  const s = new THREE.Shape();
  const th = radius * 0.28, tw = (Math.PI*2/teeth) * 0.38;
  for (let i = 0; i < teeth; i++) {
    const a0 = i/teeth*Math.PI*2, a1=a0+tw, a2=a0+Math.PI*2/teeth-tw, a3=a0+Math.PI*2/teeth;
    if(i===0) s.moveTo(Math.cos(a0)*radius, Math.sin(a0)*radius);
    else s.lineTo(Math.cos(a0)*radius, Math.sin(a0)*radius);
    s.lineTo(Math.cos(a1)*(radius+th), Math.sin(a1)*(radius+th));
    s.lineTo(Math.cos(a2)*(radius+th), Math.sin(a2)*(radius+th));
    s.lineTo(Math.cos(a3)*radius, Math.sin(a3)*radius);
  }
  s.closePath();
  const hole = new THREE.Path(); hole.absarc(0,0,radius*0.3,0,Math.PI*2,true); s.holes.push(hole);
  const geo = new THREE.ExtrudeGeometry(s,{depth,bevelEnabled:true,bevelSize:0.05,bevelThickness:0.05,bevelSegments:3});
  const m = new THREE.Mesh(geo, mat(color)); m.castShadow=true; m.receiveShadow=true; return m;
}

const g1 = gear(14, 1.15, 0.32, 0xf59e0b); g1.position.set(-1.6, 0.6, 0);
const g2 = gear(9,  0.75, 0.24, 0xd97706); g2.position.set(0.75, 0.6, 0.04);
const g3 = gear(6,  0.5,  0.18, 0xfbbf24); g3.position.set(1.92, 1.35, 0.07);
scene.add(g1, g2, g3);

const icosa = new THREE.Mesh(new THREE.IcosahedronGeometry(0.42, 0), mat(0xffffff, 0.05, 1.0));
icosa.position.set(2.8, -0.3, 0.5); icosa.castShadow=true; scene.add(icosa);

const torus = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.12, 20, 60), mat(0xe65c00, 0.15, 0.95));
torus.position.set(-2.9, -0.15, 0.4); torus.rotation.x=Math.PI/3; torus.castShadow=true; scene.add(torus);

const oct = new THREE.Mesh(new THREE.OctahedronGeometry(0.38), mat(0xfde68a, 0.1, 0.85));
oct.position.set(0.1, -1.1, 1.2); oct.castShadow=true; scene.add(oct);

const ring = new THREE.Mesh(new THREE.TorusGeometry(1.6, 0.018, 8, 120), mat(0xf59e0b, 0.4, 0.7));
ring.rotation.x = Math.PI/2 - 0.3; ring.position.y = -0.4; scene.add(ring);
const ring2 = new THREE.Mesh(new THREE.TorusGeometry(2.2, 0.01, 8, 120), mat(0xd97706, 0.5, 0.6));
ring2.rotation.x = Math.PI/2 + 0.2; ring2.rotation.z = 0.4; ring2.position.y = -0.2; scene.add(ring2);

const floor = new THREE.Mesh(new THREE.PlaneGeometry(30,30), new THREE.MeshStandardMaterial({color:0x0d0500,roughness:0.95,metalness:0.1}));
floor.rotation.x=-Math.PI/2; floor.position.y=-1.3; floor.receiveShadow=true; scene.add(floor);

scene.add(new THREE.AmbientLight(0xffecd0, 0.3));

const key = new THREE.SpotLight(0xf59e0b, 6, 18, Math.PI/5, 0.4, 1.5);
key.position.set(3, 5, 4); key.castShadow=true; key.shadow.mapSize.set(1024,1024); scene.add(key); scene.add(key.target);

const fill = new THREE.PointLight(0xe65c00, 3, 12); fill.position.set(-4, 2, 2); scene.add(fill);
const rim  = new THREE.PointLight(0xfde68a, 1.5, 8); rim.position.set(0, -0.5, 5); scene.add(rim);
const back = new THREE.PointLight(0xff6600, 2, 10); back.position.set(0, 3, -3); scene.add(back);

let t = 0;
(function animate() {
  requestAnimationFrame(animate);
  t += 0.01;

  g1.rotation.z += 0.007;
  g2.rotation.z -= 0.0105;
  g3.rotation.z += 0.0175;

  icosa.rotation.x += 0.008; icosa.rotation.y += 0.012;
  icosa.position.y = -0.3 + Math.sin(t*1.3)*0.15;

  torus.rotation.z += 0.007; torus.rotation.y += 0.004;
  torus.position.y = -0.15 + Math.sin(t*0.9+1)*0.12;

  oct.rotation.x += 0.011; oct.rotation.z += 0.009;
  oct.position.y = -1.1 + Math.sin(t*1.6+2)*0.1;

  ring.rotation.z += 0.003;
  ring2.rotation.z -= 0.002;

  fill.position.x = -4 + Math.sin(t*0.5)*1.5;
  key.position.x  =  3 + Math.cos(t*0.4)*1;

  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  renderer.setSize(W(), H);
  camera.aspect = W()/H;
  camera.updateProjectionMatrix();
});
</script>
